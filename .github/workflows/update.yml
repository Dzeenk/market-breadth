name: Daily Market Breadth Update

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run full 200-day backfill instead of daily update'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-breadth:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas requests lxml html5lib beautifulsoup4

      - name: Run breadth update
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            echo "Running full backfill..."
            python breadth_update.py --backfill
          else
            echo "Running daily update..."
            python breadth_update.py
          fi

      - name: Copy CSV to docs folder
        run: |
          mkdir -p docs
          cp market_breadth_200d_REAL.csv docs/market_breadth_200d_REAL.csv
          cp update_log.json docs/update_log.json
          echo "Files in docs:"
          ls -la docs/

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add market_breadth_200d_REAL.csv docs/market_breadth_200d_REAL.csv update_log.json docs/update_log.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "📊 Daily breadth update $(date +'%Y-%m-%d')" && git push

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: breadth-data-${{ github.run_id }}
          path: |
            market_breadth_200d_REAL.csv
            update_log.json
          retention-days: 7
