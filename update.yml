"""
Market Breadth Daily Updater
Based on Pradeep Bonde / Stockbee methodology

Runs daily after market close (scheduled via GitHub Actions).
Downloads S&P 500 + Russell 2000 components, calculates breadth metrics,
appends to CSV, and keeps a rolling 200-day window.
"""

import yfinance as yf
import pandas as pd
from datetime import datetime, timedelta
import os
import sys
import json
import time

CSV_PATH = "market_breadth_200d_REAL.csv"
LOG_PATH = "update_log.json"

# ── TICKER UNIVERSE ───────────────────────────────────────────────────────────

def get_sp500_tickers():
    """Fetch S&P 500 tickers from Wikipedia."""
    try:
        tables = pd.read_html('https://en.wikipedia.org/wiki/List_of_S%26P_500_companies')
        tickers = tables[0]['Symbol'].str.replace('.', '-', regex=False).tolist()
        print(f"  S&P 500: {len(tickers)} tickers")
        return tickers
    except Exception as e:
        print(f"  Warning: could not fetch S&P 500 list: {e}")
        return []

def get_russell2000_tickers():
    """Fetch Russell 2000 tickers via iShares ETF holdings (free)."""
    try:
        url = "https://www.ishares.com/us/products/239710/ishares-russell-2000-etf/1467271812596.ajax?tab=all&fileType=json"
        df = pd.read_json(url)
        # fallback: use a curated small-cap list
        return []
    except Exception:
        return []

def get_ticker_universe():
    """
    Build the broadest possible free ticker universe.
    Primary: S&P 500 (503 stocks) — reliable and free.
    For true Bonde breadth (~8000 stocks), a data vendor is needed.
    """
    tickers = get_sp500_tickers()

    # Add some key additional large/mid caps not in S&P 500
    extras = ['IWM', 'QQQ', 'MDY', 'IJR']  # ETFs as breadth proxies
    
    if not tickers:
        # Fallback hardcoded list of major stocks
        tickers = [
            'AAPL','MSFT','NVDA','AMZN','META','GOOGL','TSLA','BRK-B','JPM','UNH',
            'LLY','XOM','V','AVGO','MA','PG','COST','HD','MRK','CVX','ABBV','PEP',
            'KO','WMT','ADBE','CRM','TMO','MCD','CSCO','ACN','ABT','BAC','DHR','PFE',
            'TXN','NFLX','CMCSA','WFC','PM','INTC','AMD','HON','UPS','NEE','RTX',
            'AMGN','QCOM','IBM','CAT','GE','INTU','SPGI','BLK','GS','LOW','AXP',
            'ISRG','ELV','MDT','SYK','VRTX','REGN','ZTS','CI','MMC','PLD','AMT',
            'CCI','EQIX','SBA','SBAC','PSA','O','WELL','VTR','ARE','EXR',
        ]
        print(f"  Fallback universe: {len(tickers)} tickers")

    return tickers

# ── DATA DOWNLOAD ─────────────────────────────────────────────────────────────

def download_price_data(tickers, days_back=120):
    """Download adjusted close prices for the given tickers."""
    end = datetime.today()
    start = end - timedelta(days=days_back)

    print(f"  Downloading prices for {len(tickers)} tickers ({start.date()} → {end.date()})...")

    # Download in batches to avoid timeouts
    batch_size = 100
    all_data = []

    for i in range(0, len(tickers), batch_size):
        batch = tickers[i:i+batch_size]
        try:
            df = yf.download(
                batch,
                start=start,
                end=end,
                progress=False,
                auto_adjust=True,
                threads=True
            )['Close']
            all_data.append(df)
            time.sleep(0.5)  # be polite to Yahoo
        except Exception as e:
            print(f"  Warning: batch {i//batch_size + 1} failed: {e}")

    if not all_data:
        raise RuntimeError("Could not download any price data.")

    data = pd.concat(all_data, axis=1)
    data = data.dropna(axis=1, how='all')
    print(f"  Got {data.shape[1]} stocks × {data.shape[0]} days of data")
    return data

# ── BREADTH CALCULATION ───────────────────────────────────────────────────────

def calculate_breadth_for_date(data, date_idx):
    """
    Calculate all breadth metrics for a specific date index.
    """
    if date_idx < 1:
        return None

    daily_pct = data.iloc[date_idx] / data.iloc[date_idx - 1] - 1
    daily_pct = daily_pct.dropna()

    up4  = int((daily_pct >= 0.04).sum())
    dn4  = int((daily_pct <= -0.04).sum())
    up2  = int((daily_pct >= 0.02).sum())
    dn2  = int((daily_pct <= -0.02).sum())

    # 65-day (quarterly) window
    qtr_start = max(0, date_idx - 65)
    qtr_pct = data.iloc[date_idx] / data.iloc[qtr_start] - 1
    qtr_pct = qtr_pct.dropna()
    up25q = int((qtr_pct >= 0.25).sum())
    dn25q = int((qtr_pct <= -0.25).sum())
    up50q = int((qtr_pct >= 0.50).sum())

    # 20-day (monthly) window
    mo_start = max(0, date_idx - 20)
    mo_pct = data.iloc[date_idx] / data.iloc[mo_start] - 1
    mo_pct = mo_pct.dropna()
    up25m = int((mo_pct >= 0.25).sum())

    return {
        'Date': data.index[date_idx].strftime('%Y-%m-%d'),
        'Up_4pct_Daily':       up4,
        'Down_4pct_Daily':     dn4,
        'Up_2pct_Daily':       up2,
        'Down_2pct_Daily':     dn2,
        'Up_25pct_Quarter':    up25q,
        'Down_25pct_Quarter':  dn25q,
        'Up_50pct_Quarter':    up50q,
        'Up_25pct_Month':      up25m,
        'Total_Stocks':        int(daily_pct.count()),
    }

def add_rolling_metrics(df):
    """Add 10-day rolling ratio and regime/signal columns."""
    df = df.copy()
    df['10Day_Bulls'] = df['Up_4pct_Daily'].rolling(10, min_periods=5).sum().round(0).astype('Int64')
    df['10Day_Bears'] = df['Down_4pct_Daily'].rolling(10, min_periods=5).sum().round(0).astype('Int64')
    df['10Day_Ratio'] = (df['10Day_Bulls'] / df['10Day_Bears'].replace(0, 1)).round(2)

    # DCR — Daily Cumulative Ratio (running sum of daily up-down diff)
    df['DCR'] = (df['Up_4pct_Daily'] - df['Down_4pct_Daily']).cumsum()

    def regime(row):
        r = row['10Day_Ratio'] if pd.notna(row['10Day_Ratio']) else 0
        q = row['Up_25pct_Quarter']
        if r >= 2.0 and q >= 300: return 'BULL'
        if r >= 1.5 and q >= 200: return 'NEUTRAL'
        if r < 1.0 or q < 150:    return 'BEAR'
        return 'CAUTION'

    def signal(row):
        r = row['10Day_Ratio'] if pd.notna(row['10Day_Ratio']) else 0
        q = row['Up_25pct_Quarter']
        if r >= 2.0 and q >= 250: return 'TRADE'
        if r >= 1.5 and q >= 180: return 'SELECTIVE'
        return 'CASH'

    df['Market_Regime'] = df.apply(regime, axis=1)
    df['Swing_Signal']  = df.apply(signal, axis=1)
    return df

# ── MAIN UPDATE LOGIC ─────────────────────────────────────────────────────────

def load_existing_csv():
    if os.path.exists(CSV_PATH):
        df = pd.read_csv(CSV_PATH)
        print(f"  Loaded existing CSV: {len(df)} rows, last date: {df['Date'].iloc[-1]}")
        return df
    return pd.DataFrame()

def run_full_backfill(tickers):
    """Build the full 200-day history from scratch."""
    print("Running full 200-day backfill...")
    data = download_price_data(tickers, days_back=320)  # extra buffer

    rows = []
    for i in range(1, len(data)):
        row = calculate_breadth_for_date(data, i)
        if row:
            rows.append(row)

    df = pd.DataFrame(rows)
    df = df.tail(200).reset_index(drop=True)
    df = add_rolling_metrics(df)
    df.to_csv(CSV_PATH, index=False)
    print(f"  Backfill complete: {len(df)} rows saved")
    return df

def run_daily_update(tickers, existing_df):
    """Append today's data only."""
    print("Running daily update...")
    data = download_price_data(tickers, days_back=90)

    today_str = data.index[-1].strftime('%Y-%m-%d')

    if today_str in existing_df['Date'].values:
        print(f"  Already have data for {today_str}, nothing to do.")
        return existing_df

    row = calculate_breadth_for_date(data, len(data) - 1)
    if not row:
        print("  Could not calculate today's breadth.")
        return existing_df

    new_df = pd.concat([existing_df, pd.DataFrame([row])], ignore_index=True)
    new_df = new_df.tail(200).reset_index(drop=True)
    new_df = add_rolling_metrics(new_df)
    new_df.to_csv(CSV_PATH, index=False)

    latest = new_df.iloc[-1]
    print(f"  ✓ {today_str} | Up4%: {row['Up_4pct_Daily']} | Dn4%: {row['Down_4pct_Daily']} | Ratio: {latest['10Day_Ratio']} | Up25Q: {row['Up_25pct_Quarter']} | Signal: {latest['Swing_Signal']}")
    return new_df

def save_log(df):
    """Save a JSON summary for the dashboard to read."""
    if df.empty:
        return
    latest = df.iloc[-1].to_dict()
    log = {
        'last_updated': datetime.utcnow().isoformat() + 'Z',
        'latest_date': latest.get('Date', ''),
        'ratio': float(latest.get('10Day_Ratio', 0)),
        'up25q': int(latest.get('Up_25pct_Quarter', 0)),
        'dn25q': int(latest.get('Down_25pct_Quarter', 0)),
        'up4':   int(latest.get('Up_4pct_Daily', 0)),
        'dn4':   int(latest.get('Down_4pct_Daily', 0)),
        'regime': latest.get('Market_Regime', ''),
        'signal': latest.get('Swing_Signal', ''),
        'total_rows': len(df),
    }
    with open(LOG_PATH, 'w') as f:
        json.dump(log, f, indent=2)
    print(f"  Log saved to {LOG_PATH}")

# ── ENTRY POINT ───────────────────────────────────────────────────────────────

if __name__ == '__main__':
    print(f"\n{'='*55}")
    print(f"  Market Breadth Updater — {datetime.today().strftime('%Y-%m-%d %H:%M')} UTC")
    print(f"{'='*55}")

    force_backfill = '--backfill' in sys.argv

    tickers = get_ticker_universe()
    if not tickers:
        print("ERROR: No tickers available. Exiting.")
        sys.exit(1)

    existing = load_existing_csv()

    if force_backfill or existing.empty or len(existing) < 10:
        df = run_full_backfill(tickers)
    else:
        df = run_daily_update(tickers, existing)

    save_log(df)

    print(f"\n  Done. CSV has {len(df)} rows.")
    print(f"  Latest signal: {df.iloc[-1]['Swing_Signal']} | Regime: {df.iloc[-1]['Market_Regime']}")
    print(f"{'='*55}\n")
